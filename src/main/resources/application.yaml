server:
  port: ${SERVER_PORT:13100}

spring:
  application:
    name: config-server
  profiles:
    active: git

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/89-49/configs}
          default-label: ${CONFIG_GIT_BRANCH:main}
          try-master-branch: false
          search-paths:
            - .
            - common
            - "{application}"
            - "{application}/{profile}"
            - configs/common
            - "configs/{application}"
            - "configs/{application}/{profile}"
          basedir: ${CONFIG_BASEDIR:tmp/configs}
          clone-on-start: true

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${HOSTNAME:localhost}
    hostname: ${HOSTNAME:localhost}
    instance-id: ${HOSTNAME:${spring.application.name}}:${spring.application.name}:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:13101/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info,metrics

